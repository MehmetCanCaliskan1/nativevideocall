<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Server Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --accent-primary: #4f46e5;
            /* Avatar rengi */
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success-bg: #dcfce7;
            --success-text: #16a34a;
            --badge-bg: #f1f5f9;
            --badge-text: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .logo-section h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .logo-section p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.2rem;
        }

        .status-badge {
            background: var(--success-bg);
            color: var(--success-text);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--success-text);
            border-radius: 50%;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 2.5rem;
            overflow: hidden;
        }

        .stat-item {
            flex: 1;
            text-align: center;
            padding: 1.5rem;
            border-right: 1px solid var(--border-color);
        }

        .stat-item:last-child {
            border-right: none;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 400;
        }

        /* Rooms Section */
        .section-title {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .room-card {
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .room-header {
            padding: 1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .room-id {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .user-count {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .room-body {
            padding: 0.5rem 1.25rem;
        }

        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: var(--accent-primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 500;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .socket-id {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.1rem;
        }

        .host-badge {
            font-size: 0.7rem;
            background-color: rgb(250, 234, 9);
            color: var(--badge-text);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
        }

        .guest-badge {
            font-size: 0.7rem;
            background-color: #16a34a;
            color: var(--badge-text);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            background: var(--bg-color);
            border-radius: 8px;
            border: 2px dashed var(--border-color);
        }

        @media (max-width: 768px) {
            .stats-bar {
                flex-direction: column;
            }

            .stat-item {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .stat-item:last-child {
                border-bottom: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-section">
                <h1>Signal Dashboard</h1>
                <p>WebRTC Monitoring System</p>
            </div>
            <div class="status-badge">
                Server Live
                <div class="dot"></div>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="room-count">0</div>
                <div class="stat-label">Oda Sayısı</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="user-count">0</div>
                <div class="stat-label">Toplam Kullanıcı</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="uptime">0m</div>
                <div class="stat-label">Uptime</div>
            </div>
        </div>

        <div class="rooms-section">
            <h2 class="section-title">Aktif Odalar</h2>
            <div id="rooms-container" class="rooms-grid">
                <div class="empty-state">Henüz aktif bir oda bulunmuyor.</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const startTime = Date.now();

        function updateUptime() {
            const diff = Math.floor((Date.now() - startTime) / 60000);
            document.getElementById('uptime').innerText = diff + 'm';
        }

        setInterval(updateUptime, 60000);

        socket.on('dashboard-update', (data) => {
            renderDashboard(data.rooms);
        });

        function renderDashboard(rooms) {
            const roomCountEl = document.getElementById('room-count');
            const userCountEl = document.getElementById('user-count');
            const container = document.getElementById('rooms-container');

            const roomIds = Object.keys(rooms);
            let totalUsers = 0;

            roomCountEl.innerText = roomIds.length;

            if (roomIds.length === 0) {
                userCountEl.innerText = 0;
                container.innerHTML = '<div class="empty-state">Henüz aktif bir oda bulunmuyor.</div>';
                return;
            }

            container.innerHTML = '';

            roomIds.forEach(roomId => {
                const users = rooms[roomId];
                totalUsers += users.length;

                const roomCard = document.createElement('div');
                roomCard.className = 'room-card';

                let usersHtml = '';
                users.forEach(user => {
                    usersHtml += `
                        <div class="user-item">
                            <div class="user-info">
                                <div class="user-avatar">${user.username.charAt(0).toUpperCase()}</div>
                                <div class="user-details">
                                    <span class="username">${user.username}</span>
                                    <span class="socket-id">socket ID: ${user.socketId}</span>
                                </div>
                            </div>
                            ${user.isHost ? '<div class="host-badge">HOST</div>' : '<div class="guest-badge">GUEST</div>'}
                        </div>
                    `;
                });

                roomCard.innerHTML = `
                    <div class="room-header">
                        <div class="room-id">Oda numarası: ${roomId}</div>
                        <div class="user-count"> ${users.length}</div>
                    </div>
                    <div class="room-body">
                        ${usersHtml}
                    </div>
                `;
                container.appendChild(roomCard);
            });

            userCountEl.innerText = totalUsers;
        }

        // Initial fetch
        socket.emit('get-dashboard-data');
    </script>
</body>

</html>
